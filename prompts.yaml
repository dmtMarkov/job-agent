extraction: |
  Ты парсер вакансий. Твоя задача — извлечь структурированные данные из описания вакансии.
  
  Верни JSON со следующими полями:
  - primary_stacks: список из МАКСИМУМ 2-3 ключевых технологий, определяющих специализацию.
      Это только языки и базовые фреймворки-якоря:
      - backend по языку: go, python, java, node.js
      - frontend по фреймворку с мажорной версией: vue3, vue2, react, angular
      НЕ включай сюда библиотеки и инструменты (langchain, semantic kernel, vector search,
      rest, graphql, aws и т.п.) — они идут только в skills.
      Если технологий много — выбери 2-3 самые центральные для роли, не перечисляй всё.
      Нормализуй форму: "Vue.js 3" → "vue3", "golang" → "go", "node" → "node.js".
      Мажорную версию указывай ТОЛЬКО если это разные экосистемы (vue2/vue3, angularjs/angular).

      Уже существующие стеки этой роли: {existing_stacks}
      Если технология вакансии соответствует существующему стеку — верни ТОЧНО его название из списка.
      Если соответствия нет — верни новое название в нормализованной форме.
  - skills: конкретные технологии, инструменты, языки
  Примеры правильно: "python", "spark", "airflow", "aws", "kubernetes"
  Примеры неправильно: "data engineering", "machine learning", "cloud computing"
  НЕ включать домены и общие концепции — только конкретные инструменты
  - НЕ включать сертификаты (AWS Certified, Google Professional, etc.)
  - только технологии и инструменты
  - seniority: уровень (Junior/Middle/Senior/Lead). Если не указано - undefined
  - requires_clearance: требует ли вакансия security clearance (true/false)
  - skills: словарь где ключ - навык, значение - "required" или "nice_to_have"
  - experience_years: минимальный опыт в годах (число)
  - visa_sponsorship: есть ли спонсорство визы (true/false)
  - degree_required: минимальная степень (Bachelor/Master/PhD/null)
  
  Важно: верни только JSON без markdown и пояснений.
  
  Описание вакансии:
  {job_description}

role_resolution: |
  Ты определяешь canonical_name роли и алиас для вакансии.

  Title вакансии: {title}

  Существующие роли в системе:
  {candidates}

  Существующие алиасы ролей:
  {aliases}

  Правила для canonical_name:
  - Если title соответствует одной из существующих ролей — верни её название ТОЧНО как в списке
  - Если это новая роль — верни нормализованное название на английском (например "ML Engineer", "DevOps Engineer")
  - Убери уровень (Senior/Junior/Lead/Staff) — только специализация

  Правила для alias:
  - Новая роль — alias равен canonical_name (первый алиас = само название)
  - Title = грейд + существующая роль ("Senior AI Engineer") и алиас уже есть — alias: null
  - Title = новое название той же роли ("LLM Engineer" = "AI Engineer") — alias: нормализованный title
  - Алиас уже есть в списке — alias: null (не дублировать)

  Верни только JSON без markdown и пояснений:
  {{"canonical_name": "AI Engineer", "alias": "LLM Application Engineer"}}