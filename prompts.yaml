extraction: |
  Ты парсер вакансий. Твоя задача — извлечь структурированные данные из описания вакансии.
  
  Верни JSON со следующими полями:
  - primary_stacks: список из МАКСИМУМ 2-3 ключевых технологий, определяющих специализацию.
      Это только языки и базовые фреймворки-якоря:
      - backend по языку: go, python, java, node.js
      - frontend по фреймворку с мажорной версией: vue3, vue2, react, angular
      НЕ включай сюда библиотеки и инструменты (langchain, semantic kernel, vector search,
      rest, graphql, aws и т.п.) — они идут только в skills.
      Если технологий много — выбери 2-3 самые центральные для роли, не перечисляй всё.
      Нормализуй форму: "Vue.js 3" → "vue3", "golang" → "go", "node" → "node.js".
      Мажорную версию указывай ТОЛЬКО если это разные экосистемы (vue2/vue3, angularjs/angular).

      Уже существующие стеки этой роли: {existing_stacks}
      Если технология вакансии соответствует существующему стеку — верни ТОЧНО его название из списка.
      Если соответствия нет — верни новое название в нормализованной форме.
  - seniority: уровень (Junior/Middle/Senior/Lead). Если не указано - undefined
  - skills: словарь где ключ - навык, значение - "required" или "nice_to_have"
  - experience_years: минимальный опыт в годах (число)
  - visa_sponsorship: есть ли спонсорство визы (true/false)
  - degree_required: минимальная степень (Bachelor/Master/PhD/null)
  
  Важно: верни только JSON без markdown и пояснений.
  
  Описание вакансии:
  {job_description}